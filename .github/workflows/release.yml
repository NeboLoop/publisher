name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux-arm64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux-amd64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            aarch64-linux-gnu-strip cli/target/${{ matrix.target }}/release/neboai
          else
            strip cli/target/${{ matrix.target }}/release/neboai
          fi

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp cli/target/${{ matrix.target }}/release/neboai neboai-${{ matrix.platform }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp cli/target/${{ matrix.target }}/release/neboai.exe neboai-${{ matrix.platform }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neboai-${{ matrix.platform }}
          path: neboai-${{ matrix.platform }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/neboai-darwin-arm64/neboai-darwin-arm64
            artifacts/neboai-darwin-amd64/neboai-darwin-amd64
            artifacts/neboai-linux-arm64/neboai-linux-arm64
            artifacts/neboai-linux-amd64/neboai-linux-amd64
            artifacts/neboai-windows-amd64/neboai-windows-amd64.exe
